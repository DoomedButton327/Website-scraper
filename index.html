<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#03030a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Scraper Nexus</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <!-- ── Ambient Background ── -->
  <div id="starfield"></div>
  <div class="grid-texture"></div>
  <div class="scanline-overlay"></div>

  <!-- ── Toast Container ── -->
  <div id="toast-container"></div>

  <!-- ══════════════════════════════════
       APP SHELL
       ══════════════════════════════════ -->
  <div id="app">

    <!-- ── Top Navigation Bar ── -->
    <nav id="top-nav">
      <a class="nav-logo" href="#">
        <div class="nav-logo-icon">🕸️</div>
        <div>
          <div class="nav-logo-text">SCRAPER NEXUS</div>
          <div class="nav-logo-sub">Ghost Edition · Mettlestate</div>
        </div>
      </a>
      <div class="nav-actions">
        <button class="btn btn-ghost btn-icon" title="Run all" onclick="runAllAgents()">⚡</button>
        <button class="btn btn-ghost btn-icon" title="Settings" onclick="navigate('settings')">⚙️</button>
      </div>
    </nav>

    <!-- ── Page Content ── -->
    <main id="pages">

      <!-- HOME / DASHBOARD -->
      <div id="page-home" class="page active">
        <!-- Rendered by Dashboard.renderDashboard() -->
        <div style="padding:40px;text-align:center;color:var(--text-muted)">
          <div class="spin" style="font-size:32px;display:inline-block">🕸️</div>
        </div>
      </div>

      <!-- AGENTS -->
      <div id="page-agents" class="page">
        <!-- Rendered by Dashboard.renderAgents() -->
      </div>

      <!-- LOGS -->
      <div id="page-logs" class="page">
        <!-- Rendered by Dashboard.renderLogs() -->
      </div>

      <!-- SETTINGS -->
      <div id="page-settings" class="page">
        <!-- Rendered by Dashboard.renderSettings() -->
      </div>

    </main>

    <!-- ── Bottom Tab Navigation ── -->
    <nav id="bottom-nav">
      <button class="nav-tab active" data-page="home" onclick="navigate('home')">
        <span class="nav-tab-icon">🏠</span>
        <span class="nav-tab-label">Home</span>
      </button>
      <button class="nav-tab" data-page="agents" onclick="navigate('agents')">
        <span class="nav-tab-icon">🤖</span>
        <span class="nav-tab-label">Agents</span>
      </button>
      <button class="nav-tab" data-page="logs" onclick="navigate('logs')">
        <span class="nav-tab-icon">📋</span>
        <span class="nav-tab-label">Logs</span>
      </button>
      <button class="nav-tab" data-page="settings" onclick="navigate('settings')">
        <span class="nav-tab-icon">⚙️</span>
        <span class="nav-tab-label">Settings</span>
      </button>
    </nav>

  </div>

  <!-- ══════════════════════════════════
       AGENT MODAL (Create / Edit)
       ══════════════════════════════════ -->
  <div class="modal-overlay" id="modal-agent">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <span class="modal-title">New Agent</span>
        <button class="btn btn-ghost btn-icon" onclick="Modals.closeAgent()">✕</button>
      </div>
      <div class="modal-body">
        <!-- Dynamically rendered by Modals.openAgent() -->
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modals.closeAgent()">Cancel</button>
        <button class="btn btn-primary" onclick="Modals.saveAgent()">💾 Save Agent</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════
       CONFIRM MODAL
       ══════════════════════════════════ -->
  <div class="modal-overlay" id="modal-confirm">
    <div class="modal-sheet" style="max-height:auto">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <span class="modal-title" id="confirm-title">Confirm</span>
        <button class="btn btn-ghost btn-icon" onclick="Modals.closeConfirm()">✕</button>
      </div>
      <div class="modal-body">
        <p id="confirm-msg" style="color:var(--text-secondary);font-size:0.9rem;line-height:1.6"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modals.closeConfirm()">Cancel</button>
        <button class="btn btn-danger" id="confirm-ok">Confirm</button>
      </div>
    </div>
  </div>

  <!-- ── FAB: Add Agent ── -->
  <button class="fab" id="fab-add" onclick="navigate('agents');setTimeout(()=>Modals.openAgent(),300)" title="Add Agent">+</button>

  <!-- ══════════════════════════════════
       SCRIPTS (order matters)
       ══════════════════════════════════ -->
  <!-- Core -->
  <script src="js/core/storage.js"></script>
  <script src="js/core/events.js"></script>

  <!-- Discord -->
  <script src="js/discord/webhook.js"></script>

  <!-- Agents -->
  <script src="js/agents/scraper.js"></script>
  <script src="js/agents/manager.js"></script>

  <!-- UI -->
  <script src="js/ui/toast.js"></script>
  <script src="js/ui/modals.js"></script>
  <script src="js/ui/dashboard.js"></script>

  <!-- App entry -->
  <script src="js/app.js"></script>

</body>
</html>
